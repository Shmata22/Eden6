  let missing = 0;
  for (const path of ASSETS) {
    try {
      const res = await fetch(path, {cache:'reload'});
      if (!res.ok) { missing++; rows.push(`<div class="ko">KO <code>${path}</code> — ${res.status}</div>`); }

    } catch (e) { missing++; rows.push(`<div class="ko">KO <code>${path}</code> — ${e.message}</div>`); }
  }
  out.innerHTML = `<h2>${missing === 0 ? 'Tout est OK' : missing + ' fichier(s) manquant(s)'}</h2>` + rows.join('');
};
